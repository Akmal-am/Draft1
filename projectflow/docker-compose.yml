version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme_strong_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on: [db]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: projectflow
      DB_USER: postgres
      DB_PASSWORD: changeme_strong_password
      JWT_SECRET: replace_with_32plus_random_chars_secret
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: http://localhost
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/src/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on: [backend]

volumes:
  pgdata:
  uploads:
